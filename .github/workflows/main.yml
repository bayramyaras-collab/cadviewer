name: APK Derle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: index.html'i www'ye kopyala (kokten)
        run: |
          if [ -f index.html ]; then mkdir -p www && cp index.html www/index.html; fi

      - name: Paketleri yukle
        run: npm install

      - name: Android platformu ekle
        run: npx cap add android

      - name: Otomatik yamalar (MainActivity + izinler + largeHeap + ikon)
        run: node setup-android.js

      - name: Senkronla
        run: npx cap sync

      - name: APK derle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: APK yukle (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: cad-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Release yayinla
        uses: softprops/action-gh-release@v2
        with:
          tag_name: derleme-${{ github.run_number }}
          name: CAD Goruntuleyici (derleme ${{ github.run_number }})
          files: android/app/build/outputs/apk/debug/app-debug.apk
